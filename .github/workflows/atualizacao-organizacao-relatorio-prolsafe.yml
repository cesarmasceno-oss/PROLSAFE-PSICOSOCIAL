name: Organizar relatório ProlSafe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-relatorio:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Aplicar organização do relatório
        shell: bash
        run: |
          python3 - <<'PYCODE'
          from pathlib import Path
          import base64
          import gzip
          import json

          payload_b64 = (
              ""
          )

          payload = json.loads(
              gzip.decompress(base64.b64decode(payload_b64)).decode("utf-8")
          )

          for file_path, file_data in payload.items():
              target = Path(file_path)
              target.parent.mkdir(parents=True, exist_ok=True)
              content = base64.b64decode(file_data["content"])

              if file_data.get("binary"):
                  target.write_bytes(content)
              else:
                  target.write_text(content.decode("utf-8"), encoding="utf-8")

              print(f"Atualizado: {target}")
          PYCODE

      - name: Validar sintaxe
        shell: bash
        run: |
          node --check prolsafe-psicossocial/backend/src/services/pdf.service.js

      - name: Remover instalador
        shell: bash
        run: |
          rm -f .github/workflows/atualizacao-organizacao-relatorio-prolsafe.yml

      - name: Salvar atualização no GitHub
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "Nenhuma alteração encontrada."
            exit 0
          fi

          git commit -m "organiza e consolida relatório psicossocial"
          git push origin main
