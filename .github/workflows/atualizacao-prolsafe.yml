name: Aplicar atualização ProlSafe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Aplicar arquivos prontos
        shell: bash
        env:
          PROLSAFE_PAYLOAD: 
        run: |
          python3 - <<'PYCODE'
          from pathlib import Path
          import base64, json, os

          files = json.loads(base64.b64decode(os.environ['PROLSAFE_PAYLOAD']).decode())

          for relative_path, encoded_content in files.items():
              target = Path(relative_path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(base64.b64decode(encoded_content))
              print(f'Atualizado: {relative_path}')

          workflow = Path('.github/workflows/atualizacao-prolsafe.yml')
          if workflow.exists():
              workflow.unlink()
          PYCODE

      - name: Salvar atualização no GitHub
        shell: bash
        run: |
          git config user.name "ProlSafe Update Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nenhuma alteração necessária."
            exit 0
          fi
          git commit -m "adiciona importação SOC e capa corporativa"
          git push
